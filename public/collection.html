  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    :root {
      --nav-height: 70px;
      --brand: #2b0303;
      --brand-mid: #4a0606;
      --brand-light: #fdf2f2;
      --bg: #fcfcfb;
      --surface: #ffffff;
      --border: #f0f0f0;
      --border-color: #eee;
      --text: #1a1a1a;
      --danger: #d93025;
      --content-px: clamp(20px, 5vw, 80px);
      /* Measurement accent colors */
      --measure-bg: #0c1a0f;
      --measure-accent: #3ecf5a;
      --measure-muted: #4a7a52;
      --measure-text: #b8e8be;
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
      fill: currentColor;
      flex-shrink: 0;
    }

    .icon-sm {
      width: 0.85em;
      height: 0.85em;
    }

    .icon-lg {
      width: 1.25em;
      height: 1.25em;
    }

    .icon-2xl {
      width: 2em;
      height: 2em;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .sidebar {
      width: 100%;
      height: var(--nav-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 var(--content-px);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      gap: 8px;
    }

    .sidebar-header h2 {
      font-weight: 800;
      letter-spacing: -1px;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--brand);
      white-space: nowrap;
    }

    .logo-link,
    .logo-link h2 {
      text-decoration: none;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex: 1;
      gap: 4px;
      margin-left: 32px;
    }

    .nav-item {
      color: #666;
      text-decoration: none;
      padding: 8px 0;
      margin: 0 15px;
      font-size: 0.95rem;
      font-weight: 500;
      position: relative;
      white-space: nowrap;
      cursor: pointer;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0;
      height: 2px;
      background-color: #2b0303;
      transition: width 0.3s ease;
    }

    .nav-item:hover {
      color: #2b0303;
    }

    .nav-item:hover::after,
    .nav-item.active::after {
      width: 100%;
    }

    .nav-item.active {
      color: #2b0303;
      font-weight: 700;
    }

    .nav-spacer {
      margin-left: auto;
    }

    .logout {
      color: var(--danger) !important;
      font-weight: 600;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--brand);
      font-size: 1.2rem;
      margin-left: auto;
      transition: background 0.2s;
    }

    .hamburger:hover {
      background: var(--brand-light);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-text {
      text-align: right;
    }

    .greeting {
      display: block;
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .user-info strong {
      color: var(--text);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .profile-circle {
      width: 40px;
      height: 40px;
      background: #f0f0f0;
      color: var(--brand);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .06);
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .profile-circle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, .12);
    }

    .mobile-drawer {
      display: none;
      position: fixed;
      top: var(--nav-height);
      left: 0;
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid #eee;
      z-index: 999;
      padding: 12px 20px 20px;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
      transform: translateY(-10px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .mobile-drawer.open {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }

    .mobile-drawer .nav-item {
      display: block;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .mobile-search {
      margin-top: 8px;
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid transparent;
    }

    .mobile-search:focus-within {
      background: #fff;
      border-color: var(--brand);
    }

    .mobile-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.9rem;
    }

    /* ── MAIN ── */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: var(--nav-height);
      overflow-x: hidden;
    }

    .top-header {
      padding: clamp(16px, 3vw, 25px) var(--content-px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-breadcrumb {
      font-size: 0.83rem;
      color: #888;
      font-weight: 500;
    }

    .active-crumb {
      color: var(--brand);
    }

    .dashboard-content {
      padding: 0 var(--content-px) clamp(32px, 6vw, 60px);
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── COLLECTION ── */
    .collection-header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .collection-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: none;
      color: #666;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn:hover {
      color: var(--brand);
    }

    .tab-btn.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    .header-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-text h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header-text p {
      color: #666;
      font-size: 0.92rem;
    }

    .collection-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-new {
      background: var(--brand);
      color: white;
      text-decoration: none;
      padding: 11px 22px;
      border-radius: 11px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.3s, box-shadow 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-new:hover {
      background: var(--brand-mid);
      box-shadow: 0 4px 14px rgba(43, 3, 3, .2);
    }

    .collection-search {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      padding: 9px 16px;
      border-radius: 30px;
      border: 1px solid transparent;
      transition: all 0.3s;
      flex: 1;
      max-width: 350px;
    }

    .collection-search:focus-within {
      background: #fff;
      border-color: var(--brand);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .05);
    }

    .collection-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.88rem;
      color: #333;
    }

    .collection-search button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      margin-left: 6px;
    }

    /* ── PATTERN GRID ── */
    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: 28px;
    }

    /* ── PATTERN CARD ── */
    .pattern-card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: transform 0.3s cubic-bezier(.4, 0, .2, 1), box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .pattern-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, .08);
      border-color: var(--brand);
    }

    /* ── PRIVACY BUTTON ── */
    .pattern-card .privacy-btn {
      opacity: 0;
      position: absolute;
      top: 10px;
      left: 10px;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.7rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      z-index: 5;
      display: flex;
      align-items: center;
      gap: 5px;
      text-transform: uppercase;
    }

    .pattern-card:hover .privacy-btn {
      opacity: 1;
    }

    .privacy-btn.private {
      background: rgba(43, 3, 3, 0.85);
      color: #aaa;
    }
    .privacy-btn.private:hover {
      background: rgba(43, 3, 3, 1);
      color: white;
    }

    .privacy-btn.public {
      background: rgba(0, 229, 255, 0.15);
      color: #00e5ff;
      border: 1px solid rgba(0, 229, 255, 0.3);
    }
    .privacy-btn.public:hover {
      background: rgba(0, 229, 255, 0.25);
    }

    /* Hover Action Buttons */
    .card-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .pattern-card:hover .card-actions {
      opacity: 1;
      visibility: visible;
    }

    .action-icon-btn {
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-delete-action {
      background: rgba(217, 48, 37, 0.85);
    }

    .btn-delete-action:hover {
      background: #d93025;
      transform: scale(1.05);
    }

    .btn-export-action {
      background: rgba(3, 86, 43, 0.85);
    }

    .btn-export-action:hover {
      background: #03562b;
      transform: scale(1.05);
    }

    .pattern-preview {
      height: 210px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    /* Canvas is a pixel-grid crop — render at natural size (pixelated), centred.
       The canvas element sets its own pixel dimensions; CSS keeps it crisp. */
    .pattern-preview canvas {
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      /* Scale up uniformly to fill height, never stretch */
      max-height: 100%;
      max-width: 100%;
      /* Override any residual width:100% that would blur it */
      width: auto;
      height: auto;
    }

    .pattern-details {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pattern-details h4 {
      color: var(--text);
      margin-bottom: 4px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .pattern-creator {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .creator-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brand-light);
      color: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .pattern-details>p {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 16px;
    }

    .tag-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .pattern-tag {
      font-size: 0.68rem;
      background: var(--brand-light);
      color: var(--brand);
      padding: 4px 11px;
      border-radius: 50px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    /* ── MEASUREMENT EXPAND PANEL ── */
    /* Slides up from the bottom of the card on hover */
    .measure-expand {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: linear-gradient(to top, var(--measure-bg) 0%, rgba(12, 26, 15, 0.97) 100%);
      border-top: 1px solid #1a3320;
      padding: 14px 20px 18px;
      transform: translateY(100%);
      transition: transform 0.32s cubic-bezier(.4, 0, .2, 1);
      z-index: 50;
      border-radius: 0 0 18px 18px;
    }

    .pattern-card:hover .measure-expand {
      transform: translateY(0);
    }

    /* Don't show expand if there's no measurement data */
    .measure-expand.no-data {
      display: none;
    }

    .measure-expand__title {
      font-size: 0.65rem;
      font-weight: 700;
      color: var(--measure-accent);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .measure-expand__title::before {
      content: '';
      display: inline-block;
      width: 5px;
      height: 5px;
      background: var(--measure-accent);
      border-radius: 50%;
    }

    .measure-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px 14px;
    }

    .measure-cell {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .measure-cell__label {
      font-size: 0.6rem;
      color: var(--measure-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .measure-cell__value {
      font-size: 0.82rem;
      font-weight: 700;
      color: var(--measure-text);
      font-variant-numeric: tabular-nums;
    }

    .measure-cell__value em {
      font-style: normal;
      font-size: 0.65rem;
      font-weight: 500;
      color: var(--measure-muted);
      margin-left: 2px;
    }

    /* Accuracy bar inside card */
    .measure-acc-wrap {
      margin-top: 10px;
    }

    .measure-acc-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 4px;
    }

    .measure-acc-label {
      font-size: 0.6rem;
      color: var(--measure-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .measure-acc-value {
      font-size: 0.72rem;
      font-weight: 700;
      color: var(--measure-text);
    }

    .measure-acc-bar {
      background: #1a3320;
      border-radius: 3px;
      height: 4px;
      overflow: hidden;
    }

    .measure-acc-fill {
      height: 100%;
      border-radius: 3px;
      background: linear-gradient(90deg, #27653a, var(--measure-accent));
      transition: width 0.5s ease;
    }

    /* ── EMPTY / LOADING ── */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 70px 20px;
      color: #aaa;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 0.88rem;
    }

    .loading-state {
      grid-column: 1/-1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 70px 20px;
      gap: 12px;
      color: #888;
      font-size: 0.88rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #f0f0f0;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .sidebar-nav {
        margin-left: 12px;
        gap: 0;
      }

      .nav-item {
        padding: 8px 8px;
      }

      .collection-controls {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }

      .collection-search {
        max-width: 100%;
      }
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-nav {
        display: none;
      }

      .sidebar {
        padding: 0 16px;
        gap: 8px;
      }

      .dashboard-content {
        padding: 0 16px 48px;
      }

      .top-header {
        padding: 16px 16px 8px;
      }

      .user-text {
        display: none;
      }

      .collection-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .collection-tabs {
        width: 100%;
        overflow-x: auto;
      }

      .collection-controls {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
      }

      .collection-search {
        max-width: 100%;
      }

      .btn-new {
        width: 100%;
        justify-content: center;
      }

      .pattern-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .card-actions {
        opacity: 1;
        visibility: visible;
      }

      /* On mobile: always show measurement expand, no hover needed */
      .measure-expand {
        transform: translateY(0);
      }
    }

    @media (max-width: 420px) {
      :root {
        --nav-height: 56px;
      }

      .sidebar-header h2 {
        font-size: 1rem;
      }

      .profile-circle {
        width: 34px;
        height: 34px;
      }

      .tab-btn {
        padding: 12px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">

    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo-link">
          <h2>HABI-LIN</h2>
        </a>
      </div>
      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" id="home-link">Home</a>
        <a href="collection.html" class="nav-item active" id="collection-link">Collection</a>
        <a href="about.html" class="nav-item" id="about-link">About</a>
        <div class="nav-spacer"></div>
        <a href="settings.html" class="nav-item" id="settings-link">Settings</a>
        <a href="/auth/logout" class="nav-item logout" id="logout-link">Logout</a>
      </nav>
      <div class="user-info" style="margin-left:auto;">
        <div class="user-text">
          <span class="greeting" id="greeting-text">Hello,</span>
          <strong id="user-firstname">Weaver</strong>
        </div>
        <a href="user-settings.html" class="profile-circle" id="profile-btn">
          <svg class="icon" id="default-avatar-icon" aria-hidden="true">
            <use href="#icon-user" />
          </svg>
          <img id="user-photo" src="" alt=""
            style="display:none;width:100%;height:100%;border-radius:50%;object-fit:cover;" />
        </a>
      </div>
      <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
        <svg class="icon icon-lg" id="hamburger-icon" aria-hidden="true">
          <use href="#icon-bars" />
        </svg>
      </button>
    </aside>

    <div class="mobile-drawer" id="mobile-drawer" role="navigation">
      <a href="dashboard.html" class="nav-item">Home</a>
      <a href="collection.html" class="nav-item active">Collection</a>
      <a href="about.html" class="nav-item">About</a>
      <a href="settings.html" class="nav-item">Settings</a>
      <a href="/auth/logout" class="nav-item logout">Logout</a>
      <div class="mobile-search">
        <input type="text" id="mobile-search-input" placeholder="Search patterns…" />
        <svg class="icon" style="color:#aaa;margin-left:8px;flex-shrink:0;" aria-hidden="true">
          <use href="#icon-magnifying-glass" />
        </svg>
      </div>
    </div>

    <main class="main-container">
      <header class="top-header">
        <div class="header-breadcrumb">
          <span>Dashboard</span> / <span class="active-crumb">Collection</span>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="collection-header">
          <div class="collection-tabs">
            <button class="tab-btn active" id="my-patterns-tab">My Patterns</button>
            <button class="tab-btn" id="all-patterns-tab">Community Patterns</button>
          </div>
          <div class="header-content">
            <div class="header-text">
              <h1 id="section-title">Digital Patterns</h1>
              <p id="section-subtitle">Your saved weave drafts from the loom studio.</p>
            </div>
            <div class="collection-controls">
              <div class="collection-search">
                <input type="text" id="collection-search-input" placeholder="Search patterns…" />
                <button><svg class="icon">
                    <use href="#icon-magnifying-glass" />
                  </svg></button>
              </div>
              <div id="import-btn-wrapper" style="display:none;">
                <label for="import-file" class="btn-new" style="cursor: pointer;">
                  <svg class="icon" aria-hidden="true">
                    <use href="#icon-file-import" />
                  </svg> Import .habi
                </label>
                <input type="file" id="import-file" accept=".habi" style="display:none;" />
              </div>
              <a href="dashboard.html?action=new" class="btn-new">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-plus" />
                </svg> New Design
              </a>
            </div>
          </div>
        </div>
        <div class="pattern-grid" id="pattern-grid"></div>
      </section>
    </main>
  </div>

  <script>
    /* ── GLOBAL VARIABLES ── */
    let windowCurrentUserObj = null;
    let allPatterns = [];
    let currentTab = "my";
    let currentUserId = null;

    function getOwnerId(pattern) {
      if (!pattern.userId) return null;
      return (pattern.userId._id || pattern.userId).toString();
    }

    /* ── TABS ── */
    const myPatternsTab = document.getElementById("my-patterns-tab");
    const allPatternsTab = document.getElementById("all-patterns-tab");

    myPatternsTab.addEventListener("click", () => {
      currentTab = "my";
      myPatternsTab.classList.add("active");
      allPatternsTab.classList.remove("active");
      document.getElementById("import-btn-wrapper").style.display = "none";
      renderFiltered();
    });

    allPatternsTab.addEventListener("click", () => {
      currentTab = "all";
      allPatternsTab.classList.add("active");
      myPatternsTab.classList.remove("active");
      document.getElementById("import-btn-wrapper").style.display = "inline-flex";
      renderFiltered();
    });

    /* ── HAMBURGER ── */
    const hamburgerBtn = document.getElementById("hamburger-btn");
    const mobileDrawer = document.getElementById("mobile-drawer");
    hamburgerBtn.addEventListener("click", () => {
      const isOpen = mobileDrawer.classList.toggle("open");
      hamburgerBtn.setAttribute("aria-expanded", isOpen);
      document.getElementById("hamburger-icon").querySelector("use").setAttribute("href", isOpen ? "#icon-xmark" : "#icon-bars");
    });
    function closeDrawer() {
      mobileDrawer.classList.remove("open");
      hamburgerBtn.setAttribute("aria-expanded", "false");
      document.getElementById("hamburger-icon").querySelector("use").setAttribute("href", "#icon-bars");
    }
    document.addEventListener("click", (e) => {
      if (!mobileDrawer.contains(e.target) && !hamburgerBtn.contains(e.target)) closeDrawer();
    });

    /* ── SEARCH SYNC ── */
    document.getElementById("mobile-search-input").addEventListener("input", (e) => {
      document.getElementById("collection-search-input").value = e.target.value;
      renderFiltered();
    });
    document.getElementById("collection-search-input").addEventListener("input", () => renderFiltered());

    /* ── USER SESSION ── */
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("/auth/user");
        if (!res.ok) throw new Error("No session");
        const user = await res.json();
        if (user) {
          windowCurrentUserObj = user;
          currentUserId = (user._id || user.id).toString();
          const firstName = user.name.split(" ")[0];
          document.getElementById("user-firstname").textContent = firstName + "!";
          const sidebarImg = document.getElementById("user-photo");
          const sidebarIcon = document.getElementById("default-avatar-icon");
          if (user.photo && sidebarImg) {
            sidebarImg.src = user.photo;
            sidebarImg.style.display = "block";
            if (sidebarIcon) sidebarIcon.style.display = "none";
          }
        }
      } catch (e) { console.log("Session not ready."); }
      await loadPatterns();
    });

    /* ── LOAD PATTERNS ── */
    async function loadPatterns() {
      const grid = document.getElementById("pattern-grid");
      grid.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading your patterns…</div>`;
      
      try {
        // 1. AWAIT the user fetch completely before moving to patterns
        const userRes = await fetch("/auth/user");
        if (userRes.ok) {
          const user = await userRes.json();
          if (user) {
            windowCurrentUserObj = user;
            window.currentUserId = (user._id || user.id).toString();
            window.currentUserName = user.name;
            currentUserId = window.currentUserId; // Sync the local variable too
          }
        }

        // 2. Now that we definitely know the User ID, fetch patterns
        const res = await fetch("/api/patterns");
        if (!res.ok) throw new Error("Failed to fetch");
        const patterns = await res.json();
        allPatterns = patterns;
        
        // 3. IMPORTANT: Use renderFiltered() so it checks the "My Patterns" tab logic
        renderFiltered();

      } catch (err) {
        console.error("Collection fetch error:", err);
        grid.innerHTML = `<div class="empty-state"><h3>Could not load patterns</h3><p>Check your connection or server logs.</p></div>`;
      }
    }

    function renderFiltered() {
      const query = document.getElementById("collection-search-input").value.toLowerCase().trim();
      let filtered = allPatterns.filter(p =>
        (p.name || "").toLowerCase().includes(query) ||
        (p.type || "").toLowerCase().includes(query) ||
        (p.creator || "").toLowerCase().includes(query)
      );

      if (currentTab === "my") {
        filtered = filtered.filter(p => getOwnerId(p) === currentUserId && p.isImported !== true);
      } else {
        filtered = filtered.filter(p => {
          if (p.isImported === true) return true;
          
          if (p.isPrivate === false) return true;
          
          return false; 
        });
      }
      
      renderPatternGrid(filtered);
    }

    /* ── RENDER GRID ── */
/* ── RENDER GRID ── */
    function renderPatternGrid(patterns) {
      const grid = document.getElementById("pattern-grid");
      if (!patterns || patterns.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <span style="font-family:sans-serif;font-style:normal;font-size:3rem;display:block;margin-bottom:20px;">🪡</span>
            <h3>No patterns saved yet</h3>
            <p>Head to the Weaving Studio and save your first design!</p>
          </div>`;
        return;
      }
      grid.innerHTML = "";
      
      patterns.forEach(pattern => {
        const isOwnPattern = (pattern.userId === window.currentUserId) || (pattern.creator === window.currentUserName);
        const isImported = pattern.isImported === true;
        const shaftCount = pattern.loom === "traditional" ? 2 : 4;
        const lastSaved = pattern.created
          ? new Date(pattern.created).toLocaleDateString("en-PH", { month: "short", day: "numeric", year: "numeric" })
          : "Unknown date";
        const typeLabel = (pattern.type || "plain").charAt(0).toUpperCase() + (pattern.type || "plain").slice(1);

        let creatorText = "";
        if (pattern.creator) {
          creatorText = `<br><strong style="color:#555;">Created by: ${escapeHtml(pattern.creator)}</strong>`;
        }

        // ── HOVER MEASUREMENTS OVERLAY ──
        const m = pattern.measurements;
        let measureExpandHTML = "";

        if (m && typeof m.weftCount === "number") {
          const hasMeasure = m.physicalWidthCm || m.estimatedHeightCm || m.weftCount;
          if (hasMeasure) {
            const heightDisplay = m.estimatedHeightCm ? `${m.estimatedHeightCm.toFixed(1)}` : "—";
            const widthDisplay = m.physicalWidthCm ? `${m.physicalWidthCm}` : "—";
            const epcDisplay = m.endsPerCm ? `${parseFloat(m.endsPerCm).toFixed(1)}` : "—";

            measureExpandHTML = `
              <div class="measure-expand">
                <div class="measure-expand__title">Physical Measurements</div>
                <div class="measure-grid">
                  <div class="measure-cell">
                    <span class="measure-cell__label">Width</span>
                    <span class="measure-cell__value">${widthDisplay}<em> cm</em></span>
                  </div>
                  <div class="measure-cell">
                    <span class="measure-cell__label">Est. Height</span>
                    <span class="measure-cell__value">${heightDisplay}<em> cm</em></span>
                  </div>
                  <div class="measure-cell">
                    <span class="measure-cell__label">Weft Count</span>
                    <span class="measure-cell__value">${m.weftCount}<em> picks</em></span>
                  </div>
                  <div class="measure-cell">
                    <span class="measure-cell__label">Ends / cm</span>
                    <span class="measure-cell__value">${epcDisplay}<em> e/cm</em></span>
                  </div>
                </div>
              </div>`;
          }
        }

        const card = document.createElement("div");
        card.className = "pattern-card";
        card.style.position = "relative";
        card.style.overflow = "hidden";

        // ── PRIVACY BUTTON LOGIC ──
        const isPrivate = pattern.isPrivate !== false; 
        let privacyBtnHTML = "";
        
        // ONLY show the toggle if it's their own pattern AND NOT imported
        if (isOwnPattern && !isImported) {
          const pClass = isPrivate ? "private" : "public";
          const pIcon = isPrivate ? '<i class="fa-solid fa-lock"></i> Private' : '<i class="fa-solid fa-globe"></i> Public';
          privacyBtnHTML = `
            <button class="privacy-btn ${pClass}" title="Click to toggle visibility">
              ${pIcon}
            </button>
          `;
        }

        // ── HTML GENERATION (with SVG Action Icons) ──
        card.innerHTML = `
          <div class="pattern-preview" style="display:flex; justify-content:center; align-items:center;">
            ${privacyBtnHTML}
            
            <div class="card-actions">
              <button class="action-icon-btn btn-export-action" title="Export pattern to .habi">
                <svg class="icon"><use href="#icon-download" /></svg>
              </button>
              ${isOwnPattern ? `
              <button class="action-icon-btn btn-delete-action" title="Delete pattern">
                <svg class="icon"><use href="#icon-trash" /></svg>
              </button>` : ''}
            </div>

            <canvas class="pattern-canvas" style="max-width:100%; max-height:100%; object-fit:contain;"></canvas>
          </div>
          <div class="pattern-details">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:4px;">
              <h4 style="margin-bottom:0;">${escapeHtml(pattern.name || "Untitled")}</h4>
              ${isImported ? `<span style="font-size:0.6rem;background:#2b0303;color:#ff4d4d;padding:2px 6px;border-radius:4px;font-weight:800;text-transform:uppercase;">Imported</span>` : ''}
            </div>
            <p>Saved ${lastSaved} ${creatorText}</p>
            <div class="tag-row">
              <span class="pattern-tag">${typeLabel} &nbsp;·&nbsp; ${shaftCount}-shaft</span>
              <i class="fa-solid fa-chevron-right" style="color:#ccc;font-size:0.8rem;"></i>
            </div>
          </div>
          ${measureExpandHTML}
        `;

        const canvas = card.querySelector(".pattern-canvas");
        requestAnimationFrame(() => {
            if (typeof drawPatternOnCanvas === "function") {
                drawPatternOnCanvas(canvas, pattern);
            }
        });

        // ACTION: EXPORT LOGIC
        const exportBtn = card.querySelector(".btn-export-action");
        if (exportBtn) {
          exportBtn.addEventListener("click", (e) => {
            e.stopPropagation();
            exportHabi(pattern); // Triggers your existing export function!
          });
        }

        // ACTION: DELETE LOGIC
        const deleteBtn = card.querySelector(".btn-delete-action");
        if (deleteBtn) {
          deleteBtn.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete "${pattern.name}"?`)) return;
            try {
              const res = await fetch(`/api/patterns/${pattern._id}`, { method: "DELETE" });
              if (res.ok) {
                card.style.transition = "opacity 0.3s, transform 0.3s";
                card.style.opacity = "0";
                card.style.transform = "scale(0.95)";
                setTimeout(() => card.remove(), 300);
              } else {
                alert("Could not delete pattern.");
              }
            } catch (err) {
              console.error(err);
              alert("Server error while deleting.");
            }
          });
        }

        const privacyBtn = card.querySelector(".privacy-btn");
        if (privacyBtn) {
          privacyBtn.addEventListener("click", async (e) => {
            e.stopPropagation(); 
            const newPrivacyState = !pattern.isPrivate;
            
            pattern.isPrivate = newPrivacyState;
            
            renderFiltered(); 

            try {
              const res = await fetch(`/api/patterns/${pattern._id}/privacy`, {
                method: "PATCH",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ isPrivate: newPrivacyState })
              });
              
              if (!res.ok) throw new Error("Failed to update on server");
            } catch (err) {
              console.error(err);
              alert("Failed to update privacy setting. Check server logs.");
              pattern.isPrivate = !newPrivacyState; // Revert if failed
              
              renderFiltered();
            }
          });
        }

        card.addEventListener("click", (e) => {
          if (e.target.closest(".action-icon-btn") || e.target.closest(".privacy-btn") || e.target.closest(".measure-expand")) return;
          
          localStorage.setItem("resumePattern", JSON.stringify(pattern));
          
          if (typeof startResumeProcess === "function") {
              startResumeProcess();
          } else {
              window.location.href = "dashboard.html?action=resume";
          }
        });

        grid.appendChild(card);        
        drawPatternOnCanvas(card.querySelector(".pattern-canvas"), pattern);

      });
    }

    /* ── CORE ACTIONS ── */
    function exportHabi(pattern) {
      const exportData = { ...pattern, creator: windowCurrentUserObj.name, created: Date.now() };
      delete exportData._id;
      const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = (pattern.name || "pattern").replace(/\s+/g, '_').toLowerCase() + ".habi";
      a.click();
      URL.revokeObjectURL(url);
    }

    function drawPatternOnCanvas(canvas, pattern) {
      const patternRows = pattern.patternRows && pattern.patternRows.length > 0
        ? pattern.patternRows
        : simulatePatternFromSteps(pattern.steps || [], pattern.loom === "traditional" ? 2 : 4);

      if (!canvas || patternRows.length === 0) return;

      const ctx = canvas.getContext("2d");
      const warpCount = patternRows[0].length;
      const rowCount = patternRows.length;

      // ── PIXEL-GRID THUMBNAIL ──
      const CELL_PX = 6;          // px per warp/weft cell
      const MAX_COLS = 48;         // columns (warp threads) shown in the crop
      const MAX_ROWS = 30;         // rows (weft picks) shown in the crop

      const cropCols = Math.min(warpCount, MAX_COLS);
      const cropRows = Math.min(rowCount, MAX_ROWS);

      // Centre the crop horizontally; show the most-recently-woven rows at top
      const startCol = Math.floor((warpCount - cropCols) / 2);
      const startRow = Math.max(0, rowCount - cropRows);   // newest picks

      canvas.width = cropCols * CELL_PX;
      canvas.height = cropRows * CELL_PX;

      // Background
      ctx.fillStyle = "#1a1a1a";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const safeWarpColors = (pattern.warpColors && pattern.warpColors.length > 0)
        ? pattern.warpColors
        : ["#f0eadf", "#f0eadf", "#f0eadf", "#f0eadf"];
      const isPerThread = safeWarpColors.length > 4;
      const shaftCount = pattern.loom === "traditional" ? 2 : 4;
      const map = (pattern.threadingMap && pattern.threadingMap.length > 0)
        ? pattern.threadingMap
        : (shaftCount === 2 ? [0, 1] : [0, 1, 2, 3]);

      for (let ci = 0; ci < cropRows; ci++) {
        // ci=0 is the top of the canvas → newest row; mirror Y so newest = top
        const rowIndex = startRow + (cropRows - 1 - ci);
        if (rowIndex < 0 || rowIndex >= rowCount) continue;
        const rowStates = patternRows[rowIndex];
        const weftColor = (pattern.rowColors && pattern.rowColors[rowIndex])
          || pattern.weftColor || "#c0392b";

        for (let cj = 0; cj < cropCols; cj++) {
          const warpIndex = startCol + cj;
          if (warpIndex >= warpCount) continue;

          const x = cj * CELL_PX;
          const y = ci * CELL_PX;
          const isWarpUp = rowStates[warpIndex];

          if (!isWarpUp) {
            ctx.fillStyle = weftColor;
            ctx.fillRect(x, y, CELL_PX, CELL_PX);
          } else {
            const warpColor = isPerThread
              ? (safeWarpColors[warpIndex] || "#f0eadf")
              : (safeWarpColors[map[warpIndex % map.length]] || "#f0eadf");
            ctx.fillStyle = warpColor;
            ctx.fillRect(x, y, CELL_PX, CELL_PX);
          }

          // Subtle 1px dark grid lines
          ctx.strokeStyle = "rgba(0,0,0,0.18)";
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x + 0.25, y + 0.25, CELL_PX - 0.5, CELL_PX - 0.5);
        }
      }

      // Crop indicator label
      if (rowCount > MAX_ROWS) {
        ctx.fillStyle = "rgba(0,0,0,0.55)";
        ctx.fillRect(0, canvas.height - 14, canvas.width, 14);
        ctx.fillStyle = "#ccc";
        ctx.font = "bold 9px sans-serif";
        ctx.textBaseline = "middle";
        ctx.textAlign = "center";
      }
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    /* ── IMPORT .HABI ── */
    document.getElementById('import-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (event) => {
        try {
          const importedData = JSON.parse(event.target.result);
          delete importedData._id;
          importedData.isImported = true;
          importedData.userId = currentUserId;
          if (!importedData.creator) importedData.creator = "Original Weaver";
          const res = await fetch("/api/patterns/save", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(importedData)
          });
          if (res.ok) {
            alert("Pattern imported to your private gallery!");
            loadPatterns();
          }
        } catch (err) { alert("Error reading .habi file."); }
      };
      reader.readAsText(file);
      e.target.value = "";
    });
  </script>
