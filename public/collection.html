  <title>HABI-LIN | Collection</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"

  <style>

    .icon-lg {

      height: 1.25em;
    }

    .icon-2xl {

      height: 2em;
    }
  </style>

  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    :root {
      --nav-height: 70px;
      --brand: #2b0303;
      --brand-mid: #4a0606;
      --brand-light: #fdf2f2;
      --bg: #fcfcfb;
      --surface: #ffffff;
      --border: #f0f0f0;
      --border-color: #eee;
      --text: #1a1a1a;
      --danger: #d93025;
      --content-px: clamp(20px, 5vw, 80px);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .sidebar {
      width: 100%;
      height: var(--nav-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 var(--content-px);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      gap: 8px;
    }

    .sidebar-header h2 {
      font-weight: 800;
      letter-spacing: -1px;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--brand);
      white-space: nowrap;
    }

    .logo-link,
    .logo-link h2 {
      text-decoration: none;
    }

    .sidebar-nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex: 1;
      gap: 4px;
      margin-left: 32px;
    }

    .nav-item {
      color: #666;
      text-decoration: none;
      padding: 8px 12px;
      font-size: clamp(0.82rem, 1.3vw, 0.9rem);
      font-weight: 500;
      position: relative;
      white-space: nowrap;
      cursor: pointer;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      left: 12px;
      bottom: 4px;
      width: 0;
      height: 2px;
      background: var(--brand);
      transition: width 0.3s ease;
    }

    .nav-item:hover {
      color: var(--brand);
      background: var(--brand-light);
    }

    .nav-item:hover::after,
    .nav-item.active::after {
      width: calc(100% - 24px);
    }

    .nav-item.active {
      color: var(--brand);
      font-weight: 700;
    }

    .nav-spacer {
      margin-left: auto;
    }

    .logout {
      color: var(--danger) !important;
      font-weight: 600;
    }

    .search-container {
      display: none;
      align-items: center;
      background: #f5f5f5;
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid transparent;
      transition: all 0.3s;
    }

    .search-container:focus-within {
      background: #fff;
      border-color: var(--brand);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .05);
    }

    .search-input {
      width: 130px;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.83rem;
      color: #333;
      transition: width 0.3s;
    }

    .search-container:focus-within .search-input {
      width: 180px;
    }

    .search-icon-btn {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      margin-left: 6px;
      display: flex;
      align-items: center;
    }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--brand);
      font-size: 1.2rem;
      margin-left: auto;
      transition: background 0.2s;
    }

    .hamburger:hover {
      background: var(--brand-light);
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-text {
      text-align: right;
    }

    .greeting {
      display: block;
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .user-info strong {
      color: var(--text);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .profile-circle {
      width: 40px;
      height: 40px;
      background: #f0f0f0;
      color: var(--brand);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .06);
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .profile-circle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, .12);
    }

    .mobile-drawer {
      display: none;
      position: fixed;
      top: var(--nav-height);
      left: 0;
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid #eee;
      z-index: 999;
      padding: 12px 20px 20px;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
      transform: translateY(-10px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .mobile-drawer.open {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }

    .mobile-drawer .nav-item {
      display: block;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .mobile-search {
      margin-top: 8px;
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid transparent;
    }

    .mobile-search:focus-within {
      background: #fff;
      border-color: var(--brand);
    }

    .mobile-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.9rem;
    }

    /* ── MAIN ── */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: var(--nav-height);
      overflow-x: hidden;
    }

    .top-header {
      padding: clamp(16px, 3vw, 25px) var(--content-px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-breadcrumb {
      font-size: 0.83rem;
      color: #888;
      font-weight: 500;
    }

    .active-crumb {
      color: var(--brand);
    }

    .dashboard-content {
      padding: 0 var(--content-px) clamp(32px, 6vw, 60px);
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px)
      }

      to {
        opacity: 1;
        transform: translateY(0)
      }
    }

    /* ── COLLECTION ── */
    .collection-header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .collection-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: none;
      color: #666;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn:hover {
      color: var(--brand);
    }

    .tab-btn.active {
      color: var(--brand);
      border-bottom-color: var(--brand);
    }

    .header-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-text h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header-text p {
      color: #666;
      font-size: 0.92rem;
    }

    .collection-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-new {
      background: var(--brand);
      color: white;
      text-decoration: none;
      padding: 11px 22px;
      border-radius: 11px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.3s, box-shadow 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-new:hover {
      background: var(--brand-mid);
      box-shadow: 0 4px 14px rgba(43, 3, 3, .2);
    }

    /* Search bar inside collection */
    .collection-search {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      padding: 9px 16px;
      border-radius: 30px;
      border: 1px solid transparent;
      transition: all 0.3s;
      flex: 1;
      max-width: 350px;
    }

    .collection-search:focus-within {
      background: #fff;
      border-color: var(--brand);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .05);
    }

    .collection-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.88rem;
      color: #333;
    }

    .collection-search button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      margin-left: 6px;
    }

    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: 28px;
    }

    .pattern-card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: transform 0.3s cubic-bezier(.4, 0, .2, 1), box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
    }

    .pattern-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, .08);
      border-color: var(--brand);
    }

    .pattern-preview {
      height: 210px;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .pattern-preview canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .pattern-details {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pattern-details h4 {
      color: var(--text);
      margin-bottom: 4px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .pattern-creator {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .creator-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brand-light);
      color: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .pattern-details>p {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 16px;
    }

    .tag-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .pattern-tag {
      font-size: 0.68rem;
      background: var(--brand-light);
      color: var(--brand);
      padding: 4px 11px;
      border-radius: 50px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .pattern-card .delete-btn {
      opacity: 0;
      position: absolute;
      top: 10px;
      right: 10px;
      background: rgba(43, 3, 3, .85);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 10px;
      font-size: 0.72rem;
      cursor: pointer;
      transition: opacity 0.2s;
      z-index: 5;
    }

    .pattern-card:hover .delete-btn {
      opacity: 1;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 70px 20px;
      color: #aaa;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 6px;
    }

    .empty-state p {
      font-size: 0.88rem;
    }

    .loading-state {
      grid-column: 1/-1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 70px 20px;
      gap: 12px;
      color: #888;
      font-size: 0.88rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #f0f0f0;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .sidebar-nav {
        margin-left: 12px;
        gap: 0;
      }

      .nav-item {
        padding: 8px 8px;
      }

      .search-input {
        width: clamp(80px, 10vw, 130px);
      }

      .collection-controls {
        flex-direction: column;
        align-items: flex-start;
        width: 100%;
      }

      .collection-search {
        max-width: 100%;
      }
    }

    @media (max-width: 768px) {
      .hamburger {
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .sidebar-nav {
        display: none;
      }

      .sidebar {
        padding: 0 16px;
        gap: 8px;
      }

      .dashboard-content {
        padding: 0 16px 48px;
      }

      .top-header {
        padding: 16px 16px 8px;
      }

      .user-text {
        display: none;
      }

      .collection-header {
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
      }

      .collection-tabs {
        width: 100%;
        overflow-x: auto;
      }

      .collection-controls {
        flex-direction: column;
        align-items: stretch;
        width: 100%;
      }

      .collection-search {
        max-width: 100%;
      }

      .btn-new {
        width: 100%;
        justify-content: center;
      }

      .pattern-grid {
        grid-template-columns: 1fr;
        gap: 16px;
      }

      .pattern-card .delete-btn {
        opacity: 0.85;
      }
    }

    @media (max-width: 420px) {
      :root {
        --nav-height: 56px;
      }

      .sidebar-header h2 {
        font-size: 1rem;
      }

      .profile-circle {
        width: 34px;
        height: 34px;
      }

      .tab-btn {
        padding: 12px 16px;
        font-size: 0.9rem;
      }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">

    <!-- ── TOP NAV ── -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo-link">
          <h2>HABI-LIN</h2>
        </a>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" id="home-link">Home</a>
        <a href="collection.html" class="nav-item active" id="collection-link">Collection</a>
        <a href="about.html" class="nav-item" id="about-link">About</a>
        <div class="nav-spacer"></div>
        <a href="settings.html" class="nav-item" id="settings-link">Settings</a>
        <a href="/auth/logout" class="nav-item logout">Logout</a>
      </nav>

      <div class="user-info" style="margin-left:auto;">
        <div class="user-text">
          <span class="greeting">Hello,</span>
          <strong id="user-firstname">Weaver</strong>
        </div>
        <a href="user-settings.html" class="profile-circle" id="profile-btn">
          <svg class="icon" id="default-avatar-icon" aria-hidden="true">
            <use href="#icon-user" />
          </svg>
          <img id="user-photo" src="" alt=""
            style="display:none;width:100%;height:100%;border-radius:50%;object-fit:cover;" />
        </a>
      </div>

      <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
        <svg class="icon icon-lg" id="hamburger-icon" aria-hidden="true">
          <use href="#icon-bars" />
        </svg>
      </button>
    </aside>

    <!-- Mobile drawer -->
    <div class="mobile-drawer" id="mobile-drawer" role="navigation">
      <a href="dashboard.html" class="nav-item">Home</a>
      <a href="collection.html" class="nav-item active">Collection</a>
      <a href="about.html" class="nav-item">About</a>
      <a href="settings.html" class="nav-item">Settings</a>
      <a href="/auth/logout" class="nav-item logout">Logout</a>
      <div class="mobile-search">
        <input type="text" id="mobile-search-input" placeholder="Search patterns…" />
        <svg class="icon" style="color:#aaa;margin-left:8px;flex-shrink:0;" aria-hidden="true">
          <use href="#icon-magnifying-glass" />
        </svg>
      </div>
    </div>

    <!-- ── MAIN ── -->
    <main class="main-container">
      <header class="top-header">
        <div class="header-breadcrumb">
          <span>Dashboard</span> / <span class="active-crumb">Collection</span>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="collection-header">
          <div class="collection-tabs">
            <button class="tab-btn active" id="my-patterns-tab">My Patterns</button>
            <button class="tab-btn" id="all-patterns-tab">All Patterns</button>
          </div>

          <div class="header-content">
            <div class="header-text">
              <h1 id="section-title">Digital Patterns</h1>
              <p id="section-subtitle">Your saved weave drafts from the loom studio.</p>
            </div>
            <div class="collection-controls">
              <div class="collection-search">
                <input type="text" id="collection-search-input" placeholder="Search patterns…" />
                <button><svg class="icon" aria-hidden="true">
                    <use href="#icon-magnifying-glass" />
                  </svg></button>
              </div>
              <a href="dashboard.html" onclick="sessionStorage.setItem('openLoom','1')" class="btn-new">
                <svg class="icon" aria-hidden="true">
                  <use href="#icon-plus" />
                </svg> New Design
              </a>
            </div>
          </div>
        </div>
        <div class="pattern-grid" id="pattern-grid"></div>
      </section>
    </main>
  </div>

  <script>
    /* ── TAB MANAGEMENT ── */
    const myPatternsTab = document.getElementById("my-patterns-tab");
    const allPatternsTab = document.getElementById("all-patterns-tab");
    const sectionTitle = document.getElementById("section-title");
    const sectionSubtitle = document.getElementById("section-subtitle");
    let currentTab = "my"; // "my" or "all"
    let currentUserId = null;

    myPatternsTab.addEventListener("click", () => {
      currentTab = "my";
      myPatternsTab.classList.add("active");
      allPatternsTab.classList.remove("active");
      sectionTitle.textContent = "Digital Patterns";
      sectionSubtitle.textContent = "Your saved weave drafts from the loom studio.";
      document.getElementById("collection-search-input").value = "";
      renderPatternGrid(allPatterns.filter(p => p.userId === currentUserId));
    });

    allPatternsTab.addEventListener("click", () => {
      currentTab = "all";
      allPatternsTab.classList.add("active");
      myPatternsTab.classList.remove("active");
      sectionTitle.textContent = "Community Patterns";
      sectionSubtitle.textContent = "Explore weave designs from the community.";
      document.getElementById("collection-search-input").value = "";
      renderPatternGrid(allPatterns);
    });

    /* ── HAMBURGER ── */
    const hamburgerBtn = document.getElementById("hamburger-btn");
    const mobileDrawer = document.getElementById("mobile-drawer");
    hamburgerBtn.addEventListener("click", () => {
      const isOpen = mobileDrawer.classList.toggle("open");
      hamburgerBtn.setAttribute("aria-expanded", isOpen);
      document.getElementById("hamburger-icon").querySelector("use").setAttribute("href", isOpen ? "#icon-xmark" : "#icon-bars");
    });
    function closeDrawer() {
      mobileDrawer.classList.remove("open");
      hamburgerBtn.setAttribute("aria-expanded", "false");
      document.getElementById("hamburger-icon").querySelector("use").setAttribute("href", "#icon-bars");
    }
    document.addEventListener("click", (e) => {
      if (!mobileDrawer.contains(e.target) && !hamburgerBtn.contains(e.target)) closeDrawer();
    });

    /* ── SEARCH SYNC ── */
    document.getElementById("mobile-search-input").addEventListener("input", (e) => {
      document.getElementById("collection-search-input").value = e.target.value;
      filterPatterns(e.target.value);
    });
    document.getElementById("collection-search-input").addEventListener("input", (e) => filterPatterns(e.target.value));

    /* ── USER SESSION ── */
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("/auth/user");
        if (!res.ok) throw new Error("No session");
        const user = await res.json();
        if (user) {
          currentUserId = user._id || user.id;
          const firstName = user.name.split(" ")[0];
          document.getElementById("user-firstname").textContent = firstName + "!";
          if (user.photo) {
            document.getElementById("user-photo").src = user.photo;
            document.getElementById("user-photo").style.display = "block";
            document.getElementById("default-avatar-icon").style.display = "none";
          }
        }
      } catch (e) { console.log("Session not ready."); }
      await loadPatterns();
    });

    /* ── PATTERN HELPERS ── */
    let allPatterns = [];

    function simulatePatternFromSteps(steps, shaftCount) {
      const history = []; const warpCount = 60;
      const threading = Array.from({ length: warpCount + 1 }, (_, i) => i % shaftCount);
      let pressedPedals = new Set();
      for (const step of steps) {
        if (step.action === "pedal") pressedPedals.add(step.value);
        else if (step.action === "pedals") pressedPedals = new Set(step.value);
        else if (step.action === "beat") {
          const shed = Array.from({ length: shaftCount }, (_, i) => !pressedPedals.has(i));
          history.push(threading.map(shaft => shed[shaft]));
        }
      }
      return history;
    }

    function drawPatternOnCanvas(canvas, patternRows, weftColor = "#c0392b") {
      if (!canvas || !patternRows || patternRows.length === 0) return;
      const warpCount = patternRows[0].length; const rowCount = patternRows.length;
      const cellSize = Math.min(Math.floor(canvas.width / warpCount), Math.floor(canvas.height / rowCount), 8);
      canvas.width = warpCount * cellSize; canvas.height = rowCount * cellSize;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "#f5f0eb"; ctx.fillRect(0, 0, canvas.width, canvas.height);
      patternRows.forEach((rowStates, rowIndex) => {
        const y = (rowCount - 1 - rowIndex) * cellSize;
        rowStates.forEach((isWarpUp, warpIndex) => {
          const x = warpIndex * cellSize;
          if (!isWarpUp) { ctx.fillStyle = weftColor; ctx.fillRect(x, y, cellSize, cellSize); }
          else { ctx.fillStyle = "#1a1a1a"; ctx.fillRect(x + cellSize * 0.75, y, cellSize * 0.25, cellSize); }
        });
      });
    }

    async function loadPatterns() {
      const grid = document.getElementById("pattern-grid");
      grid.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading patterns…</div>`;
      try {
        const res = await fetch("/api/patterns");
        if (!res.ok) throw new Error("Failed to fetch");
        allPatterns = await res.json();
        // Initial render: show user's patterns
        renderPatternGrid(allPatterns.filter(p => p.userId === currentUserId));
      } catch (err) {
        grid.innerHTML = `<div class="empty-state"><svg class="icon icon-2xl" style="color:#ddd;display:block;margin:0 auto 18px;" aria-hidden="true"><use href="#icon-warning"/></svg><h3>Could not load patterns</h3><p>Make sure your server is running and <code>/api/patterns</code> is available.</p></div>`;
      }
    }

    function filterPatterns(q) {
      const query = q.toLowerCase().trim();
      const filtered = allPatterns.filter(p =>
        (p.name || "").toLowerCase().includes(query) ||
        (p.type || "").toLowerCase().includes(query) ||
        (p.loom || "").toLowerCase().includes(query)
      );

      if (currentTab === "my") {
        renderPatternGrid(filtered.filter(p => p.userId === currentUserId));
      } else {
        renderPatternGrid(filtered);
      }
    }

    function getInitials(name) {
      if (!name) return "?";
      const parts = name.split(" ");
      return parts.length > 1
        ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
        : parts[0].substring(0, 2).toUpperCase();
    }

    function renderPatternGrid(patterns) {
      const grid = document.getElementById("pattern-grid");
      if (!patterns || patterns.length === 0) {
        const emptyMessage = currentTab === "my"
          ? `<div class="empty-state"><span style="font-size:2.8rem;display:block;margin-bottom:16px;">🪡</span><h3>No patterns saved yet</h3><p>Head to the Weaving Studio and save your first design!</p></div>`
          : `<div class="empty-state"><span style="font-size:2.8rem;display:block;margin-bottom:16px;">🧵</span><h3>No patterns found</h3><p>Try adjusting your search or check back later for new community patterns.</p></div>`;
        grid.innerHTML = emptyMessage;
        return;
      }
      grid.innerHTML = "";
      patterns.forEach(pattern => {
        const shaftCount = pattern.loom === "traditional" ? 2 : 4;
        const weftColor = pattern.weftColor || "#c0392b";
        const patternRows = pattern.patternRows?.length ? pattern.patternRows : simulatePatternFromSteps(pattern.steps || [], shaftCount);
        const createdAt = pattern.created ? new Date(pattern.created).toLocaleDateString("en-PH", { month: "short", day: "numeric", year: "numeric" }) : "Unknown date";
        const typeLabel = (pattern.type || "plain").charAt(0).toUpperCase() + (pattern.type || "plain").slice(1);
        const isOwnPattern = pattern.userId === currentUserId;
        const creatorName = pattern.creatorName || "Unknown";
        const creatorInitials = getInitials(creatorName);

        const card = document.createElement("div");
        card.className = "pattern-card";

        const deleteBtn = currentTab === "my" ? `<button class="delete-btn" title="Delete pattern"><svg class="icon icon-sm" aria-hidden="true"><use href="#icon-trash"/></svg></button>` : '';
        const creatorInfo = !isOwnPattern ? `<div class="pattern-creator"><div class="creator-avatar">${escapeHtml(creatorInitials)}</div><span>by ${escapeHtml(creatorName)}</span></div>` : '';

        card.innerHTML = `
        <div class="pattern-preview">
          <canvas class="pattern-canvas" width="300" height="180"></canvas>
          ${deleteBtn}
        </div>
        <div class="pattern-details">
          <h4>${escapeHtml(pattern.name || "Untitled")}</h4>
          ${creatorInfo}
          <p>Saved ${createdAt} &nbsp;·&nbsp; ${patternRows.length} row${patternRows.length !== 1 ? "s" : ""}</p>
          <div class="tag-row">
            <span class="pattern-tag">${typeLabel} &nbsp;·&nbsp; ${shaftCount}-shaft</span>
            <svg class="icon icon-sm" style="color:#ccc;" aria-hidden="true"><use href="#icon-chevron-right"/></svg>
          </div>
        </div>`;

        requestAnimationFrame(() => drawPatternOnCanvas(card.querySelector(".pattern-canvas"), patternRows, weftColor));

        const deleteBtn_elem = card.querySelector(".delete-btn");
        if (deleteBtn_elem) {
          deleteBtn_elem.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete "${pattern.name}"?`)) return;
            try {
              const res = await fetch(`/api/patterns/${pattern._id}`, { method: "DELETE" });
              if (res.ok) {
                card.style.transition = "opacity 0.3s,transform 0.3s";
                card.style.opacity = "0";
                card.style.transform = "scale(0.95)";
                setTimeout(() => card.remove(), 300);
                allPatterns = allPatterns.filter(p => p._id !== pattern._id);
              } else {
                alert("Could not delete pattern.");
              }
            } catch (err) {
              alert("Server error while deleting.");
            }
          });
        }

        grid.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }
  </script>
</body>

</html>
