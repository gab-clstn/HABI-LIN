  <style>
    /* ── BASE & ICONS ── */
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', sans-serif;
    }

    :root {
      --nav-height: 70px;
      --brand: #2b0303;
      --brand-mid: #4a0606;
      --brand-light: #fdf2f2;
      --bg: #fcfcfb;
      --surface: #ffffff;
      --border: #f0f0f0;
      --border-color: #eee;
      --text: #1a1a1a;
      --danger: #d93025;
      --content-px: clamp(20px, 5vw, 80px);
    }

    html,
    body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
    }

    .icon {
      display: inline-block;
      width: 1em;
      height: 1em;
      vertical-align: -0.125em;
      fill: currentColor;
      flex-shrink: 0;
    }

    .icon-sm { width: 0.85em; height: 0.85em; }
    .icon-lg { width: 1.25em; height: 1.25em; }
    .icon-2xl { width: 2em; height: 2em; }

    .page-wrapper {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* ── NAV ── */
    .sidebar {
      width: 100%;
      height: var(--nav-height);
      background: var(--surface);
      border-bottom: 1px solid var(--border-color);
      display: flex;
      align-items: center;
      padding: 0 var(--content-px);
      position: fixed;
      top: 0;
      left: 0;
      z-index: 1000;
      gap: 8px;
    }

    .sidebar-header h2 {
      font-weight: 800;
      letter-spacing: -1px;
      font-size: clamp(1.1rem, 2.5vw, 1.4rem);
      color: var(--brand);
      white-space: nowrap;
    }

    .logo-link, .logo-link h2 { text-decoration: none; }

    /* Update these specific classes to match Dashboard.html exactly */
    .sidebar-nav {
      display: flex;
      flex-direction: row;
      align-items: center;
      flex: 1;
      gap: 4px;
      margin-left: 32px;
    }

    .nav-item {
      color: #666;
      text-decoration: none;
      padding: 8px 0;
      margin: 0 15px;
      font-size: 0.95rem;
      font-weight: 500;
      position: relative;
      white-space: nowrap;
      cursor: pointer;
    }

    .nav-item::after {
      content: '';
      position: absolute;
      left: 0;
      bottom: -6px;
      width: 0;
      height: 2px;
      background-color: #2b0303;
      transition: width 0.3s ease;
    }

    .logo-link,
    .logo-link h2 {
      text-decoration: none;
    }

    .nav-item:hover {
      color: #2b0303;
    }

    .nav-item:hover::after,
    .nav-item.active::after {
      width: 100%;
    }

    .nav-item.active {
      color: #2b0303;
      font-weight: 700;
    }

    .nav-spacer {
      margin-left: auto;
    }
    
    .logout { color: var(--danger) !important; font-weight: 600; }

    .hamburger {
      display: none;
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      border-radius: 8px;
      color: var(--brand);
      font-size: 1.2rem;
      margin-left: auto;
      transition: background 0.2s;
    }

    .hamburger:hover { background: var(--brand-light); }

    .user-info {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .user-text { text-align: right; }

    .greeting {
      display: block;
      font-size: 0.72rem;
      color: #888;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .user-info strong {
      color: var(--text);
      font-weight: 600;
      font-size: 0.92rem;
    }

    .profile-circle {
      width: 40px;
      height: 40px;
      background: #f0f0f0;
      color: var(--brand);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      border: 2px solid white;
      box-shadow: 0 4px 10px rgba(0, 0, 0, .06);
      text-decoration: none;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      flex-shrink: 0;
    }

    .profile-circle:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 18px rgba(0, 0, 0, .12);
    }

    .mobile-drawer {
      display: none;
      position: fixed;
      top: var(--nav-height);
      left: 0;
      width: 100%;
      background: var(--surface);
      border-bottom: 1px solid #eee;
      z-index: 999;
      padding: 12px 20px 20px;
      flex-direction: column;
      gap: 4px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, .08);
      transform: translateY(-10px);
      opacity: 0;
      transition: transform 0.25s ease, opacity 0.25s ease;
    }

    .mobile-drawer.open {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }

    .mobile-drawer .nav-item {
      display: block;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 0.95rem;
    }

    .mobile-search {
      margin-top: 8px;
      display: flex;
      align-items: center;
      background: #f5f5f5;
      border-radius: 10px;
      padding: 10px 14px;
      border: 1px solid transparent;
    }

    .mobile-search:focus-within {
      background: #fff;
      border-color: var(--brand);
    }

    .mobile-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.9rem;
    }

    /* ── MAIN ── */
    .main-container {
      flex: 1;
      display: flex;
      flex-direction: column;
      margin-top: var(--nav-height);
      overflow-x: hidden;
    }

    .top-header {
      padding: clamp(16px, 3vw, 25px) var(--content-px);
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .header-breadcrumb {
      font-size: 0.83rem;
      color: #888;
      font-weight: 500;
    }

    .active-crumb { color: var(--brand); }

    .dashboard-content {
      padding: 0 var(--content-px) clamp(32px, 6vw, 60px);
      animation: fadeIn 0.35s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px) }
      to { opacity: 1; transform: translateY(0) }
    }

    /* ── COLLECTION ── */
    .collection-header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 30px;
    }

    .collection-tabs {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
    }

    .tab-btn {
      padding: 12px 20px;
      border: none;
      background: none;
      color: #666;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      position: relative;
      transition: color 0.3s;
      border-bottom: 3px solid transparent;
      margin-bottom: -2px;
    }

    .tab-btn:hover { color: var(--brand); }
    .tab-btn.active { color: var(--brand); border-bottom-color: var(--brand); }

    .header-content {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header-text h1 {
      font-size: clamp(1.5rem, 4vw, 2rem);
      color: var(--brand);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .header-text p { color: #666; font-size: 0.92rem; }

    .collection-controls {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .btn-new {
      background: var(--brand);
      color: white;
      text-decoration: none;
      padding: 11px 22px;
      border-radius: 11px;
      font-weight: 600;
      font-size: 0.88rem;
      transition: background 0.3s, box-shadow 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .btn-new:hover {
      background: var(--brand-mid);
      box-shadow: 0 4px 14px rgba(43, 3, 3, .2);
    }

    /* Search bar inside collection */
    .collection-search {
      display: flex;
      align-items: center;
      background: #f5f5f5;
      padding: 9px 16px;
      border-radius: 30px;
      border: 1px solid transparent;
      transition: all 0.3s;
      flex: 1;
      max-width: 350px;
    }

    .collection-search:focus-within {
      background: #fff;
      border-color: var(--brand);
      box-shadow: 0 4px 12px rgba(0, 0, 0, .05);
    }

    .collection-search input {
      flex: 1;
      border: none;
      background: transparent;
      outline: none;
      font-size: 0.88rem;
      color: #333;
    }

    .collection-search button {
      background: none;
      border: none;
      color: #888;
      cursor: pointer;
      display: flex;
      align-items: center;
      margin-left: 6px;
    }

    .pattern-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(100%, 320px), 1fr));
      gap: 28px;
    }

    .pattern-card {
      background: var(--surface);
      border-radius: 18px;
      overflow: hidden;
      border: 1px solid #eee;
      transition: transform 0.3s cubic-bezier(.4, 0, .2, 1), box-shadow 0.3s, border-color 0.3s;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    .pattern-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 14px 32px rgba(0, 0, 0, .08);
      border-color: var(--brand);
    }

    /* Hover Actions (OG logic integrated visually) */
    .card-actions {
      position: absolute;
      top: 12px;
      right: 12px;
      display: flex;
      gap: 8px;
      z-index: 100;
      opacity: 0;
      visibility: hidden;
      transition: all 0.2s ease;
    }

    .pattern-card:hover .card-actions {
      opacity: 1;
      visibility: visible;
    }

    .action-icon-btn {
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-delete-action { background: rgba(217, 48, 37, 0.85); }
    .btn-delete-action:hover { background: #d93025; transform: scale(1.05); }
    .btn-export-action { background: rgba(3, 86, 43, 0.85); }
    .btn-export-action:hover { background: #03562b; transform: scale(1.05); }

    .pattern-preview {
      height: 210px;
      background: #f9f9f9;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    .pattern-preview canvas {
      width: 100%;
      height: 100%;
      image-rendering: pixelated;
    }

    .pattern-details {
      padding: 24px;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .pattern-details h4 {
      color: var(--text);
      margin-bottom: 4px;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .pattern-creator {
      font-size: 0.8rem;
      color: #999;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .creator-avatar {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      background: var(--brand-light);
      color: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .pattern-details > p {
      font-size: 0.88rem;
      color: #888;
      margin-bottom: 16px;
    }

    .tag-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: auto;
    }

    .pattern-tag {
      font-size: 0.68rem;
      background: var(--brand-light);
      color: var(--brand);
      padding: 4px 11px;
      border-radius: 50px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 70px 20px;
      color: #aaa;
    }

    .empty-state h3 {
      font-size: 1.1rem;
      color: #666;
      margin-bottom: 6px;
    }

    .empty-state p { font-size: 0.88rem; }

    .loading-state {
      grid-column: 1/-1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 70px 20px;
      gap: 12px;
      color: #888;
      font-size: 0.88rem;
    }

    .spinner {
      width: 22px;
      height: 22px;
      border: 3px solid #f0f0f0;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 1024px) {
      .sidebar-nav { margin-left: 12px; gap: 0; }
      .nav-item { padding: 8px 8px; }
      .search-input { width: clamp(80px, 10vw, 130px); }
      .collection-controls { flex-direction: column; align-items: flex-start; width: 100%; }
      .collection-search { max-width: 100%; }
    }

    @media (max-width: 768px) {
      .hamburger { display: flex; align-items: center; justify-content: center; }
      .sidebar-nav { display: none; }
      .sidebar { padding: 0 16px; gap: 8px; }
      .dashboard-content { padding: 0 16px 48px; }
      .top-header { padding: 16px 16px 8px; }
      .user-text { display: none; }
      .collection-header { flex-direction: column; align-items: flex-start; gap: 16px; }
      .collection-tabs { width: 100%; overflow-x: auto; }
      .collection-controls { flex-direction: column; align-items: stretch; width: 100%; }
      .collection-search { max-width: 100%; }
      .btn-new { width: 100%; justify-content: center; }
      .pattern-grid { grid-template-columns: 1fr; gap: 16px; }
      .card-actions { opacity: 1; visibility: visible; }
    }

    @media (max-width: 420px) {
      :root { --nav-height: 56px; }
      .sidebar-header h2 { font-size: 1rem; }
      .profile-circle { width: 34px; height: 34px; }
      .tab-btn { padding: 12px 16px; font-size: 0.9rem; }
    }
  </style>
</head>

<body>
  <div class="page-wrapper">

    <aside class="sidebar">
      <div class="sidebar-header">
        <a href="dashboard.html" class="logo-link">
          <h2>HABI-LIN</h2>
        </a>
      </div>

      <nav class="sidebar-nav">
        <a href="dashboard.html" class="nav-item" id="home-link">Home</a>
        <a href="collection.html" class="nav-item active" id="collection-link">Collection</a>
        <a href="about.html" class="nav-item" id="about-link">About</a>
        
        <div class="nav-spacer"></div>
        
        <a href="settings.html" class="nav-item" id="settings-link">Settings</a>
        <a href="/auth/logout" class="nav-item logout" id="logout-link">Logout</a>
      </nav>

      <div class="user-info" style="margin-left:auto;">
        <div class="user-text">
          <span class="greeting" id="greeting-text">Hello,</span>
          <strong id="user-firstname">Weaver</strong>
        </div>
        <a href="user-settings.html" class="profile-circle" id="profile-btn">
          <svg class="icon" id="default-avatar-icon" aria-hidden="true">
            <use href="#icon-user" />
          </svg>
          <img id="user-photo" src="" alt="" style="display:none;width:100%;height:100%;border-radius:50%;object-fit:cover;" />
        </a>
      </div>

      <button class="hamburger" id="hamburger-btn" aria-label="Open menu" aria-expanded="false">
        <svg class="icon icon-lg" id="hamburger-icon" aria-hidden="true">
          <use href="#icon-bars" />
        </svg>
      </button>
    </aside>

    <div class="mobile-drawer" id="mobile-drawer" role="navigation">
      <a href="dashboard.html" class="nav-item">Home</a>
      <a href="collection.html" class="nav-item active">Collection</a>
      <a href="about.html" class="nav-item">About</a>
      <a href="settings.html" class="nav-item">Settings</a>
      <a href="/auth/logout" class="nav-item logout">Logout</a>
      <div class="mobile-search">
        <input type="text" id="mobile-search-input" placeholder="Search patterns…" />
        <svg class="icon" style="color:#aaa;margin-left:8px;flex-shrink:0;" aria-hidden="true">
          <use href="#icon-magnifying-glass" />
        </svg>
      </div>
    </div>

    <main class="main-container">
      <header class="top-header">
        <div class="header-breadcrumb">
          <span>Dashboard</span> / <span class="active-crumb">Collection</span>
        </div>
      </header>

      <section class="dashboard-content">
        <div class="collection-header">
          <div class="collection-tabs">
            <button class="tab-btn active" id="my-patterns-tab">My Patterns</button>
            <button class="tab-btn" id="all-patterns-tab">All Patterns</button>
          </div>

          <div class="header-content">
            <div class="header-text">
              <h1 id="section-title">Digital Patterns</h1>
              <p id="section-subtitle">Your saved weave drafts from the loom studio.</p>
            </div>
            <div class="collection-controls">
            <div class="collection-search">
              <input type="text" id="collection-search-input" placeholder="Search patterns…" />
              <button><svg class="icon"><use href="#icon-magnifying-glass" /></svg></button>
            </div>

            <div id="import-btn-wrapper" style="display:none;">
              <label for="import-file" class="btn-new" style="cursor: pointer;">
                <svg class="icon" aria-hidden="true"><use href="#icon-file-import" /></svg> Import .habi
              </label>
              <input type="file" id="import-file" accept=".habi" style="display:none;" />
            </div>

            <a href="dashboard.html?action=new" class="btn-new">
              <svg class="icon" aria-hidden="true"><use href="#icon-plus" /></svg> New Design
            </a>
          </div>
          </div>
        </div>
        <div class="pattern-grid" id="pattern-grid"></div>
      </section>
    </main>
  </div>

  <script>
    /* ── GLOBAL VARIABLES ── */
    let windowCurrentUserObj = null; // Save user globally so we can brand exports (from OG)
    let allPatterns = [];
    let currentTab = "my"; // "my" or "all"
    let currentUserId = null;

    /* ── TAB MANAGEMENT ── */
    const myPatternsTab = document.getElementById("my-patterns-tab");
    const allPatternsTab = document.getElementById("all-patterns-tab");
    const sectionTitle = document.getElementById("section-title");
    const sectionSubtitle = document.getElementById("section-subtitle");

    myPatternsTab.addEventListener("click", () => {
      currentTab = "my";
      myPatternsTab.classList.add("active");
      allPatternsTab.classList.remove("active");
      
      document.getElementById("import-btn-wrapper").style.display = "none";
      
      const myOnly = allPatterns.filter(p => (p.userId === currentUserId || !p.userId) && p.isImported !== true);
      renderPatternGrid(myOnly);
    });

    allPatternsTab.addEventListener("click", () => {
      currentTab = "all";
      allPatternsTab.classList.add("active");
      myPatternsTab.classList.remove("active");
      
      document.getElementById("import-btn-wrapper").style.display = "inline-flex";
      
      // Filter out imported patterns before rendering
      const sharedPatterns = allPatterns.filter(p => p.isImported !== true);
      renderPatternGrid(sharedPatterns);
    });

    /* ── HAMBURGER ── */
    const hamburgerBtn = document.getElementById("hamburger-btn");
    const mobileDrawer = document.getElementById("mobile-drawer");
    hamburgerBtn.addEventListener("click", () => {
      const isOpen = mobileDrawer.classList.toggle("open");
      hamburgerBtn.setAttribute("aria-expanded", isOpen);
      document.getElementById("hamburger-icon").querySelector("use").setAttribute("href", isOpen ? "#icon-xmark" : "#icon-bars");
    });
    function closeDrawer() {
      mobileDrawer.classList.remove("open");
      hamburgerBtn.setAttribute("aria-expanded", "false");
      document.getElementById("hamburger-icon").querySelector("use").setAttribute("href", "#icon-bars");
    }
    document.addEventListener("click", (e) => {
      if (!mobileDrawer.contains(e.target) && !hamburgerBtn.contains(e.target)) closeDrawer();
    });

    /* ── SEARCH SYNC ── */
    document.getElementById("mobile-search-input").addEventListener("input", (e) => {
      document.getElementById("collection-search-input").value = e.target.value;
      filterPatterns(e.target.value);
    });
    document.getElementById("collection-search-input").addEventListener("input", (e) => filterPatterns(e.target.value));

    /* ── USER SESSION ── */
    document.addEventListener("DOMContentLoaded", async () => {
      try {
        const res = await fetch("/auth/user");
        if (!res.ok) throw new Error("No session");
        const user = await res.json();
        
        if (user) {
          windowCurrentUserObj = user; 
          currentUserId = user._id || user.id; 
          
          // --- SIDEBAR PFP FIX ---
          const firstName = user.name.split(" ")[0];
          document.getElementById("user-firstname").textContent = firstName + "!";
          
          const sidebarImg = document.getElementById("user-photo");
          const sidebarIcon = document.getElementById("default-avatar-icon");
          
          if (user.photo && sidebarImg) {
            sidebarImg.src = user.photo;
            sidebarImg.style.display = "block";
            if (sidebarIcon) sidebarIcon.style.display = "none";
          }
        }
      } catch (e) { console.log("Session not ready."); }
      await loadPatterns();
    });

    /* ── PATTERN HELPERS (OG Logic Preserved) ── */
    function simulatePatternFromSteps(steps, shaftCount) {
      const history = [];
      const warpCount = 60;
      const threading = [];
      for (let i = 0; i < warpCount + 1; i++) threading.push(i % shaftCount);
      let pressedPedals = new Set();

      for (const step of steps) {
        if (step.action === "pedal") pressedPedals.add(step.value);
        else if (step.action === "pedals") pressedPedals = new Set(step.value);
        else if (step.action === "beat") {
          const shed = [];
          for (let i = 0; i < shaftCount; i++) shed.push(!pressedPedals.has(i));
          const rowStates = [];
          for (let i = 0; i <= warpCount; i++) {
            const shaft = threading[i % threading.length];
            rowStates.push(shed[shaft]);
          }
          history.push(rowStates);
        }
      }
      return history;
    }

    // OG Canvas Drawing Logic
    function drawPatternOnCanvas(canvas, pattern) {
      const patternRows = pattern.patternRows || [];
      const fallbackWeft = pattern.weftColor || "#c0392b";
      if (!canvas || patternRows.length === 0) return;

      const warpCount = patternRows[0].length;
      const rowCount  = patternRows.length;
      const cellSize = Math.min(Math.max(1, Math.floor(canvas.width / warpCount)), Math.max(1, Math.floor(canvas.height / rowCount)), 8);

      canvas.width  = warpCount * cellSize;
      canvas.height = rowCount  * cellSize;
      const ctx = canvas.getContext("2d");
      
      ctx.fillStyle = "#ffffff";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      const safeWarpColors = (pattern.warpColors && pattern.warpColors.length > 0) 
          ? pattern.warpColors 
          : ["#f0eadf", "#f0eadf", "#f0eadf", "#f0eadf"];

      const shaftCount = pattern.loom === 'traditional' ? 2 : 4;
      const map = (pattern.threadingMap && pattern.threadingMap.length > 0) 
          ? pattern.threadingMap 
          : (shaftCount === 2 ? [0,1] : [0,1,2,3]);

      patternRows.forEach((rowStates, rowIndex) => {
        const y = (rowCount - 1 - rowIndex) * cellSize;
        const currentRowColor = (pattern.rowColors && pattern.rowColors[rowIndex]) ? pattern.rowColors[rowIndex] : fallbackWeft;

        rowStates.forEach((isWarpUp, warpIndex) => {
          const x = warpIndex * cellSize;
          const hIdx = map.length > 0 ? map[warpIndex % map.length] : (warpIndex % shaftCount);
          
          // Draw Weft underneath
          ctx.fillStyle = currentRowColor;
          ctx.fillRect(x, y, cellSize, cellSize);

          if (isWarpUp) {
            // Draw Warp overlapping on top
            ctx.fillStyle = safeWarpColors[hIdx] || "#ffffff"; 
            ctx.fillRect(x + (cellSize * 0.25), y, cellSize * 0.5, cellSize); 
          }
        });
      });
    }

    async function loadPatterns() {
      const grid = document.getElementById("pattern-grid");
      grid.innerHTML = `<div class="loading-state"><div class="spinner"></div> Loading patterns…</div>`;
      try {
        const res = await fetch("/api/patterns");
        if (!res.ok) throw new Error("Failed to fetch");
        allPatterns = await res.json();
        
        if (currentTab === "my") {
            const myOnly = allPatterns.filter(p => (p.userId === currentUserId || !p.userId) && p.isImported !== true);
            renderPatternGrid(myOnly);
        } else {
            // "All Patterns": Show community patterns + MY imported patterns (hide others' imports)
            const sharedPatterns = allPatterns.filter(p => {
                if (p.isImported === true) {
                    return p.userId === currentUserId; 
                }
                return true; 
            });
            renderPatternGrid(sharedPatterns);
        }

      } catch (err) {
        grid.innerHTML = `<div class="empty-state"><svg class="icon icon-2xl" style="color:#ddd;display:block;margin:0 auto 18px;" aria-hidden="true"><use href="#icon-warning"/></svg><h3>Could not load patterns</h3><p>Make sure your server is running.</p></div>`;
      }
    }

    allPatternsTab.addEventListener("click", () => {
      currentTab = "all";
      allPatternsTab.classList.add("active");
      myPatternsTab.classList.remove("active");
      
      document.getElementById("import-btn-wrapper").style.display = "inline-flex";
      
      // "All Patterns": Show community patterns + MY imported patterns (hide others' imports)
      const sharedPatterns = allPatterns.filter(p => {
          if (p.isImported === true) {
              return p.userId === currentUserId; 
          }
          return true; 
      });
      renderPatternGrid(sharedPatterns);
    });

    function filterPatterns(q) {
      const query = q.toLowerCase().trim();
      const filtered = allPatterns.filter(p =>
        (p.name || "").toLowerCase().includes(query) ||
        (p.type || "").toLowerCase().includes(query) ||
        (p.loom || "").toLowerCase().includes(query) ||
        (p.creator || "").toLowerCase().includes(query) 
      );

      if (currentTab === "my") {
        renderPatternGrid(filtered.filter(p => (p.userId === currentUserId || !p.userId) && p.isImported !== true));
      } else {
        // Apply the same privacy filter to search results on "All Patterns"
        renderPatternGrid(filtered.filter(p => {
            if (p.isImported === true) {
                return p.userId === currentUserId; 
            }
            return true;
        }));
      }
    }

    function getInitials(name) {
      if (!name) return "?";
      const parts = name.split(" ");
      return parts.length > 1
        ? (parts[0][0] + parts[parts.length - 1][0]).toUpperCase()
        : parts[0].substring(0, 2).toUpperCase();
    }

    function renderPatternGrid(patterns) {
      const grid = document.getElementById("pattern-grid");
      if (!patterns || patterns.length === 0) {
        const emptyMessage = currentTab === "my"
          ? `<div class="empty-state"><span style="font-size:2.8rem;display:block;margin-bottom:16px;">🪡</span><h3>No patterns saved yet</h3><p>Head to the Weaving Studio and save your first design!</p></div>`
          : `<div class="empty-state"><span style="font-size:2.8rem;display:block;margin-bottom:16px;">🧵</span><h3>No patterns found</h3><p>Try adjusting your search or check back later for new community patterns.</p></div>`;
        grid.innerHTML = emptyMessage;
        return;
      }
      grid.innerHTML = "";

      patterns.forEach(pattern => {
        const shaftCount = pattern.loom === "traditional" ? 2 : 4;
        const patternRows = pattern.patternRows && pattern.patternRows.length > 0
            ? pattern.patternRows
            : simulatePatternFromSteps(pattern.steps || [], shaftCount);
            
        const lastSaved = pattern.created ? new Date(pattern.created).toLocaleDateString("en-PH", { month: "short", day: "numeric", year: "numeric" }) : "Unknown date";
        const typeLabel = (pattern.type || "plain").charAt(0).toUpperCase() + (pattern.type || "plain").slice(1);
        
        const isOwnPattern = pattern.userId === currentUserId || !pattern.userId;

        // --- NAME LOGIC: Use actual name instead of "You" ---
        let authorDisplay = pattern.creator || "Unknown Weaver";
        
        // If it's my pattern and NOT an import, use the name from my current session
        if (isOwnPattern && pattern.isImported !== true && windowCurrentUserObj) {
            authorDisplay = windowCurrentUserObj.name;
        }

        // Indicator Badge
        let importBadge = "";
        if (pattern.isImported === true) {
            importBadge = ` <span style="font-size: 0.65rem; background: #e0e0e0; color: #444; padding: 2px 8px; border-radius: 4px; margin-left: 6px; font-weight: 800; vertical-align: middle;">IMPORTED</span>`;
        }

        const creatorText = `<br><strong style="color:#555;">Created by: ${escapeHtml(authorDisplay)}${importBadge}</strong>`;

        const cardActions = `
          <div class="card-actions">
            <button class="action-icon-btn btn-export-action export-btn" title="Export .habi file">
              <svg class="icon" aria-hidden="true"><use href="#icon-download" /></svg>
            </button>
            ${isOwnPattern ? `
            <button class="action-icon-btn btn-delete-action delete-btn" title="Delete pattern">
              <svg class="icon" aria-hidden="true"><use href="#icon-trash" /></svg>
            </button>` : ''}
          </div>
        `;

        const card = document.createElement("div");
        card.className = "pattern-card";
        card.innerHTML = `
        <div class="pattern-preview">
          <canvas class="pattern-canvas" width="300" height="180"></canvas>
          ${cardActions}
        </div>
        <div class="pattern-details">
          <h4>${escapeHtml(pattern.name || "Untitled")}</h4>
          <p>
            Saved ${lastSaved} &nbsp;·&nbsp; ${patternRows.length} row${patternRows.length !== 1 ? "s" : ""}
            ${creatorText}
          </p>
          <div class="tag-row">
            <span class="pattern-tag">${typeLabel} &nbsp;·&nbsp; ${shaftCount}-shaft</span>
          </div>
        </div>`;

        // RESUME CLICK LISTENER (from OG)
        card.addEventListener("click", () => {
          localStorage.setItem("resumePattern", JSON.stringify(pattern));
          window.location.href = "dashboard.html?action=resume";
        });

        // Draw Canvas (using OG logic)
        requestAnimationFrame(() => drawPatternOnCanvas(card.querySelector(".pattern-canvas"), pattern));

        // EXPORT .HABI EVENT (from OG)
        card.querySelector(".export-btn").addEventListener("click", (e) => {
          e.stopPropagation(); 
          
          const exportData = { ...pattern };
          
          // 1. The new user claims the exported file:
          exportData.creator = windowCurrentUserObj ? windowCurrentUserObj.name : "Unknown Weaver";
          
          // 2. The date resets to the exact moment they exported it:
          exportData.created = Date.now(); 
          
          // Clean up any experimental fields
          delete exportData.originalDate;
          delete exportData.exportedDate;
          
          const dataStr = JSON.stringify(exportData, null, 2);
          const blob = new Blob([dataStr], { type: "application/json" });
          const url = URL.createObjectURL(blob);
          const a = document.createElement("a");
          
          a.href = url;
          a.download = (exportData.name || "pattern").replace(/[^a-z0-9]/gi, '_').toLowerCase() + ".habi";
          document.body.appendChild(a);
          a.click();
          
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });

        // DELETE EVENT (from OG + Array filter)
        const deleteBtn_elem = card.querySelector(".delete-btn");
        if (deleteBtn_elem) {
          deleteBtn_elem.addEventListener("click", async (e) => {
            e.stopPropagation();
            if (!confirm(`Delete "${pattern.name}"?`)) return;
            try {
              const res = await fetch(`/api/patterns/${pattern._id}`, { method: "DELETE" });
              if (res.ok) {
                card.style.transition = "opacity 0.3s,transform 0.3s";
                card.style.opacity = "0";
                card.style.transform = "scale(0.95)";
                setTimeout(() => card.remove(), 300);
                allPatterns = allPatterns.filter(p => p._id !== pattern._id);
              } else {
                alert("Could not delete pattern.");
              }
            } catch (err) {
              alert("Server error while deleting.");
            }
          });
        }

        grid.appendChild(card);
      });
    }

    function escapeHtml(str) {
      return String(str).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;");
    }

    // 5. IMPORT .HABI FILE EVENT LISTENER
    document.getElementById('import-file').addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;

      const reader = new FileReader();
      reader.onload = async (event) => {
          try {
              const importedData = JSON.parse(event.target.result);
              
              delete importedData._id; 
              
              // 1. Tag it as an import so it stays out of "My Patterns"
              importedData.isImported = true;
              
              // 2. Assign it to the current user so they are the ONLY ones who see it in "All Patterns"
              importedData.userId = currentUserId;

              // 3. Ensure the original creator's name is kept
              if (!importedData.creator) {
                   importedData.creator = "Original Weaver"; 
              }
              
              const res = await fetch("/api/patterns/save", {
                  method: "POST",
                  headers: { "Content-Type": "application/json" },
                  body: JSON.stringify(importedData)
              });

              if (res.ok) {
                  alert("Pattern imported to Community Gallery!");
                  loadPatterns(); 
              }
          } catch (err) {
              alert("Error reading .habi file.");
          }
      };
      reader.readAsText(file);
      e.target.value = ""; 
    });
    
  </script>
