<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HABI-LIN | Auth</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="login-body">
    <div class="auth-container" id="auth-container">
        
        <div class="form-container sign-up-container">
            <form id="signupForm">
                <h1>Create Account</h1>
                
                <div id="signupMsg" class="form-message"></div>

                <div class="social-icons">
                    <a href="/auth/facebook" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="/auth/google" class="social-btn"><i class="fab fa-google"></i></a>
                </div>
                <span>or use your email for registration</span>
                <input type="text" name="name" placeholder="Name" required />
                <input type="email" name="email" placeholder="Email" required />
                <input type="password" name="password" placeholder="Password" required />
                <button type="submit" class="btn-primary">Sign Up</button>
            </form>
        </div>

        <div class="form-container sign-in-container">
            <form id="loginForm">
                <h1>Sign In</h1>

                <div id="loginMsg" class="form-message"></div>

                <div class="social-icons">
                    <a href="/auth/facebook" class="social-btn"><i class="fab fa-facebook-f"></i></a>
                    <a href="/auth/google" class="social-btn"><i class="fab fa-google"></i></a>
                </div>
                <span>or use your account</span>
                <input type="email" name="email" placeholder="Email" required />
                <input type="password" name="password" placeholder="Password" required />
                <a href="#" class="forgot">Forgot your password?</a>
                <button type="submit" class="btn-primary">Sign In</button>
            </form>
        </div>

        <div class="overlay-container">
            <div class="overlay">
                <div class="overlay-panel overlay-left">
                    <h1>Welcome Back!</h1>
                    <p>To keep connected with us please login with your personal info</p>
                    <button class="btn-ghost" id="signIn">Sign In</button>
                </div>
                <div class="overlay-panel overlay-right">
                    <h1>Hello, Weaver!</h1>
                    <p>Enter your personal details and start your journey with us</p>
                    <button class="btn-ghost" id="signUp">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const container = document.getElementById('auth-container');
        const signUpBtn = document.getElementById('signUp');
        const signInBtn = document.getElementById('signIn');

        // Function to switch to Sign In
        const showSignIn = () => container.classList.remove("right-panel-active");
        // Function to switch to Sign Up
        const showSignUp = () => container.classList.add("right-panel-active");

        // Clear messages when manually clicking buttons
        const clearMsgs = () => {
            document.querySelectorAll('.form-message').forEach(m => {
                m.textContent = '';
                m.className = 'form-message';
            });
        };

        signUpBtn.addEventListener('click', () => { clearMsgs(); showSignUp(); });
        signInBtn.addEventListener('click', () => { clearMsgs(); showSignIn(); });

        const displayMsg = (elementId, message, type) => {
            const el = document.getElementById(elementId);
            el.textContent = message;
            el.className = `form-message ${type}`;
        };

        // Handle Local Login
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const res = await fetch('/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    window.location.href = '/dashboard.html';
                } else {
                    displayMsg('loginMsg', 'Invalid email or password.', 'error');
                }
            } catch (err) {
                displayMsg('loginMsg', 'System error. Try again.', 'error');
            }
        });

        // Handle Local Signup
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const data = Object.fromEntries(formData);
            
            try {
                const res = await fetch('/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });

                if (res.ok) {
                    // 1. Show message on the Sign Up side
                    displayMsg('signupMsg', 'Account created! Redirecting to Sign In...', 'success');
                    e.target.reset();

                    // 2. Wait 2 seconds, then slide back to Sign In automatically
                    setTimeout(() => {
                        showSignIn();
                        // Optional: show a message on the login side too
                        displayMsg('loginMsg', 'Success! You can now sign in.', 'success');
                    }, 2000);

                } else {
                    const errData = await res.json();
                    displayMsg('signupMsg', errData.message || 'Signup failed.', 'error');
                }
            } catch (err) {
                displayMsg('signupMsg', 'Connection error.', 'error');
            }
        });
    </script>
</body>
</html>
