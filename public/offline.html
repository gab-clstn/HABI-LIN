<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HABI-LIN | Offline</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --brand: #2b0303;
            --brand-light: #fdf2f2;
            --bg: #fcfcfb;
        }

        body {
            background: var(--bg);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: clamp(32px, 6vw, 60px);
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0, 0, 0, .08);
            border: 1px solid #f0f0f0;
        }

        .icon {
            font-size: 4rem;
            margin-bottom: 24px;
            display: block;
        }

        h1 {
            font-size: clamp(1.4rem, 4vw, 1.8rem);
            color: var(--brand);
            font-weight: 800;
            margin-bottom: 12px;
        }

        p {
            color: #666;
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .features {
            background: var(--brand-light);
            border-radius: 14px;
            padding: 20px;
            margin: 24px 0;
            text-align: left;
        }

        .features h3 {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--brand);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .feature-item {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 8px;
            font-size: 0.88rem;
            color: #444;
        }

        .feature-item:last-child {
            margin-bottom: 0;
        }

        .dot-yes {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #22c55e;
            flex-shrink: 0;
        }

        .dot-no {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ef4444;
            flex-shrink: 0;
        }

        .btn {
            display: inline-block;
            background: var(--brand);
            color: white;
            padding: 13px 28px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: none;
            border: none;
            cursor: pointer;
            transition: background 0.2s, transform 0.15s;
            margin-top: 8px;
        }

        .btn:hover {
            background: #4a0606;
            transform: translateY(-2px);
        }

        .status {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #aaa;
        }

        #online-status {
            font-weight: 600;
        }

        .online {
            color: #22c55e;
        }

        .offline {
            color: #ef4444;
        }
    </style>
    <link rel="icon" href="/icons/icon-192.png" type="image/png" />
</head>

<body>
    <div class="card">
        <span class="icon">🧵</span>
        <h1>You're Offline</h1>
        <p>No internet connection detected. Don't worry — some features are still available!</p>

        <div class="features">
            <h3>What's available offline</h3>
            <div class="feature-item"><span class="dot-yes"></span> Browse previously loaded pages</div>
            <div class="feature-item"><span class="dot-yes"></span> View cached patterns</div>
            <div class="feature-item"><span class="dot-no"></span> Login / Signup</div>
            <div class="feature-item"><span class="dot-no"></span> Save new patterns</div>
            <div class="feature-item"><span class="dot-no"></span> Community patterns</div>
        </div>

        <button class="btn" onclick="retryConnection()">Try Again</button>

        <p class="status">Status: <span id="online-status" class="offline">Offline</span></p>
    </div>

    <script>
        function updateStatus() {
            const el = document.getElementById("online-status");
            if (navigator.onLine) {
                el.textContent = "Back Online!";
                el.className = "online";
                setTimeout(() => window.location.href = "/dashboard.html", 1500);
            } else {
                el.textContent = "Offline";
                el.className = "offline";
            }
        }

        function retryConnection() {
            updateStatus();
            if (!navigator.onLine) {
                const btn = document.querySelector(".btn");
                btn.textContent = "Still offline...";
                setTimeout(() => btn.textContent = "Try Again", 2000);
            }
        }

        window.addEventListener("online", updateStatus);
        window.addEventListener("offline", updateStatus);
        updateStatus();
    </script>
</body>

</html>
